name: tagpr

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  tagpr:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - id: tagpr
        uses: Songmu/tagpr@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release
        run: npm run build:mac

      - name: Package macOS distribution bundle
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          bundle_dir="release/mailark-${version}-mac-bundle"
          zip_path="release/mailark-${version}-mac-bundle.zip"
          dmg_path="release/mailark-${version}-mac-universal.dmg"

          rm -rf "$bundle_dir" "$zip_path"
          mkdir -p "$bundle_dir"
          cp scripts/distribution/install-setup.sh "$bundle_dir/"
          cp "$dmg_path" "$bundle_dir/"

          (
            cd release
            zip -qry "$(basename "$zip_path")" "$(basename "$bundle_dir")"
          )

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*-mac-bundle.zip

  build-win:
    runs-on: windows-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run build:win

      - name: Package Windows distribution bundle
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $bundleDir = "release/mailark-$version-win-bundle"
          $zipPath = "release/mailark-$version-win-bundle.zip"
          $exePath = "release/mailark-$version-win-x64.exe"

          if (Test-Path $bundleDir) {
            Remove-Item $bundleDir -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $bundleDir | Out-Null
          Copy-Item scripts/distribution/install-setup.bat -Destination $bundleDir
          Copy-Item $exePath -Destination $bundleDir
          Compress-Archive -Path $bundleDir -DestinationPath $zipPath

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*-win-bundle.zip

  build-linux:
    runs-on: ubuntu-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            release/*.AppImage
            release/*.AppImage.blockmap

  release:
    runs-on: ubuntu-latest
    needs:
      - tagpr
      - build-mac
      - build-win
      - build-linux
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes from tag message
        shell: bash
        run: |
          notes="$(git for-each-ref "refs/tags/${{ needs.tagpr.outputs.tag }}" --format='%(contents)')"
          if [ -z "$notes" ]; then
            notes="Release ${{ needs.tagpr.outputs.tag }}"
          fi
          printf '%s\n' "$notes" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tagpr.outputs.tag }}
          body_path: release-notes.md
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.dmg.blockmap
            release-artifacts/**/*-mac-bundle.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.exe.blockmap
            release-artifacts/**/*-win-bundle.zip
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.AppImage.blockmap
