name: tagpr

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  tagpr:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - id: tagpr
        uses: Songmu/tagpr@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            scripts/distribution/install-setup.sh

  build-win:
    runs-on: windows-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          path: |
            release/*.exe
            release/*.exe.blockmap
            scripts/distribution/install-setup.bat

  build-linux:
    runs-on: ubuntu-latest
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            release/*.AppImage
            release/*.AppImage.blockmap

  release:
    runs-on: ubuntu-latest
    needs:
      - tagpr
      - build-mac
      - build-win
      - build-linux
    if: needs.tagpr.outputs.tag != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes from tag message
        shell: bash
        run: |
          notes="$(git for-each-ref "refs/tags/${{ needs.tagpr.outputs.tag }}" --format='%(contents)')"
          if [ -z "$notes" ]; then
            notes="Release ${{ needs.tagpr.outputs.tag }}"
          fi
          printf '%s\n' "$notes" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tagpr.outputs.tag }}
          body_path: release-notes.md
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.dmg.blockmap
            release-artifacts/**/install-setup.sh
            release-artifacts/**/*.exe
            release-artifacts/**/*.exe.blockmap
            release-artifacts/**/install-setup.bat
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.AppImage.blockmap
