name: tagpr

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  tagpr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: Songmu/tagpr@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
