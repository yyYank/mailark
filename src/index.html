<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-src 'none';">
<title>mailark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f10;
    --bg2: #17171a;
    --bg3: #1e1e23;
    --bg4: #252529;
    --border: #2a2a30;
    --accent: #e8ff5a;
    --accent2: #5affd4;
    --text: #e8e8f0;
    --text2: #888898;
    --text3: #555565;
    --danger: #ff6b6b;
    --radius: 8px;
  }

  body[data-theme="light"] {
    --bg: #f5f1e8;
    --bg2: #ebe4d6;
    --bg3: #e1d7c4;
    --bg4: #d7ccb6;
    --border: #c8baa1;
    --accent: #0e7c66;
    --accent2: #a33b2f;
    --text: #261c14;
    --text2: #5d4d40;
    --text3: #887765;
    --danger: #c74444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }

  #root {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── TITLEBAR ── */
  #titlebar {
    height: 52px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px 0 80px;
    -webkit-app-region: drag;
    flex-shrink: 0;
    gap: 12px;
  }
  #titlebar .app-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  #titlebar .file-name {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
  #titlebar .spacer { flex: 1; }
  #open-btn {
    -webkit-app-region: no-drag;
    background: var(--accent);
    color: #0f0f10;
    border: none;
    padding: 7px 16px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }
  #open-btn:hover { opacity: 0.85; }
  #theme-btn {
    -webkit-app-region: no-drag;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  #theme-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--bg2);
  }

  /* ── SEARCH BAR ── */
  #search-bar {
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #search-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text3); }
  #mail-count {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  #filter-unknown-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  #filter-unknown-label input[type="checkbox"] {
    accent-color: var(--accent);
    cursor: pointer;
  }
  #sort-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  #sort-btn:hover { border-color: var(--accent); color: var(--text); }
  #sort-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── EMAIL LIST ── */
  #email-list {
    width: 320px;
    min-width: 240px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    background: var(--bg2);
  }
  #email-list::-webkit-scrollbar { width: 4px; }
  #email-list::-webkit-scrollbar-track { background: transparent; }
  #email-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .email-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .email-item:hover { background: var(--bg3); }
  .email-item.active {
    background: var(--bg3);
    border-left: 2px solid var(--accent);
  }
  .email-item .from {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .email-item .subject {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .email-item .meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .email-item .date {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
  .email-item .attach-badge {
    font-size: 10px;
    background: var(--bg4);
    color: var(--accent2);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* ── EMAIL DETAIL ── */
  #email-detail {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  #email-detail::-webkit-scrollbar { width: 4px; }
  #email-detail::-webkit-scrollbar-track { background: transparent; }
  #email-detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #detail-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #detail-subject {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .detail-meta {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 4px 12px;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .detail-meta .label {
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding-top: 1px;
  }
  .detail-meta .value { color: var(--text2); word-break: break-all; }

  /* Attachments */
  #attachments-area {
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .attach-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 12px;
  }
  .attach-chip:hover {
    border-color: var(--accent2);
    background: var(--bg4);
  }
  .attach-chip .attach-icon { font-size: 16px; }
  .attach-chip .attach-name { color: var(--text); font-weight: 500; }
  .attach-chip .attach-type { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Body view toggle */
  #view-toggle {
    display: flex;
    gap: 0;
    padding: 12px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .view-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 5px 14px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .view-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-left: none; }
  .view-btn.active { background: var(--accent); color: #0f0f10; border-color: var(--accent); font-weight: 600; }

  #email-body {
    flex: 1;
    padding: 24px 28px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text2);
    white-space: pre-wrap;
    font-family: 'DM Mono', monospace;
    word-break: break-word;
  }
  #email-body-html {
    flex: 1;
    border: none;
    width: 100%;
    background: var(--bg);
    min-height: 400px;
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text3);
  }
  #empty-state .icon {
    font-size: 48px;
    opacity: 0.4;
  }
  #empty-state .title {
    font-size: 16px;
    color: var(--text2);
    font-weight: 500;
  }
  #empty-state .sub {
    font-size: 13px;
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
  }
  #empty-state .open-link {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 9px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: border-color 0.15s;
  }
  #empty-state .open-link:hover { border-color: var(--accent); }

  /* No selection */
  #no-selection {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 14px;
  }

  /* Loading */
  #loading {
    align-items: center;
    justify-content: center;
    flex: 1;
    flex-direction: column;
    gap: 16px;
    color: var(--text3);
  }
  #loading .loading-label {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }
  #progress-track {
    width: 260px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.1s ease;
  }
  #progress-detail {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
  }

  .highlight { background: rgba(232,255,90,0.25); border-radius: 2px; }

  #email-list-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="../dist/renderer.js"></script>
</body>
</html>
